name = "dashboard"
main = "worker.js"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "TOKENS"
# No id here on purpose: Cloudflare auto-provisions this namespace on first
# deploy (wrangler >=4.45) and writes the id back into this file. Once that
# first deploy succeeds, pin it — read the id from Cloudflare (Storage &
# Databases -> KV) and set it explicitly, so a later deploy can't orphan the
# saved password by re-provisioning a fresh namespace.

# Rung-2 fallback (scheduled pull of a provider export) — leave commented until
# a source actually needs it, per capability-matrix.md.
# [triggers]
# crons = ["17 5 * * *"]
